<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SharePoint 快速访问</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 动态液态背景光晕 -->
  <div class="glass-bg-blob blob-1"></div>
  <div class="glass-bg-blob blob-2"></div>

  <div class="app-container">
    <!-- 头部栏 -->
    <header class="app-header">
      <div class="brand">
        <span class="logo-icon">📂</span>
        <h2 class="app-title gradient-text">SharePoint Map</h2>
      </div>
      <div class="actions">
        <button id="settingsBtn" title="配置选项" class="icon-btn">⚙️</button>
      </div>
    </header>
    
    <!-- 提示条 (如配置缺失或需要登录) -->
    <div id="alertBanner" class="alert-banner hide">
      <span id="alertText">请先配置您的站点。</span>
      <button id="alertActionBtn" class="banner-action-btn">去配置</button>
    </div>

    <!-- 搜索栏 -->
    <div class="search-box-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索文件名或路径...">
        <button id="clearSearchBtn" class="clear-btn hide">✕</button>
      </div>
    </div>

    <!-- 主要内容区 -->
    <main class="main-content">
      <!-- 搜索结果视图 (默认隐藏) -->
      <section id="searchResultsSection" class="content-section hide">
        <div class="section-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <h3 class="section-title" style="margin-bottom: 0;">🔍 搜索结果</h3>
          <span id="searchResultCount" style="font-size: 11px; color: var(--text-muted);">共 0 条</span>
        </div>
        
        <!-- 搜索过滤条 -->
        <div class="search-filter-row">
          <div class="search-filter-bar">
            <button class="filter-chip active" data-filter="all">全部</button>
            <div class="filter-select-wrapper">
              <select id="l1FilterSelect" class="filter-select">
                <option value="all">所有 1 级目录 📂</option>
              </select>
            </div>
          </div>
          <div class="search-filter-bar">
            <button class="filter-chip" data-filter="folder">文件夹 📁</button>
            <button class="filter-chip" data-filter="word">文档 📄</button>
            <button class="filter-chip" data-filter="excel">表格 📊</button>
            <button class="filter-chip" data-filter="ppt">PPT 📉</button>
            <button class="filter-chip" data-filter="pdf">PDF 📕</button>
            <button class="filter-chip" data-filter="prism">Prism 📊</button>
          </div>
        </div>

        <div id="searchResultsList" class="search-results-list">
          <!-- 动态插入搜索结果 -->
        </div>
      </section>

      <!-- 默认树形与收藏夹视图 -->
      <div id="defaultViews">
        <!-- 收藏夹部分 -->
        <section id="favoritesSection" class="content-section">
          <h3 class="section-title">⭐ 快捷收藏 <span id="favCount"></span></h3>
          <div id="favoritesList" class="empty-list-placeholder">
            暂无收藏。点击下方文件夹旁的 ⭐ 即可加入收藏夹。
          </div>
        </section>

        <!-- 目录树浏览部分 -->
        <section id="directorySection" class="content-section">
          <div class="directory-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 class="section-title toggle-title" id="directoryToggleBtn" style="margin-bottom: 0; flex-grow: 1; display: flex; align-items: center; justify-content: space-between;">
              <span>📁 全部目录 (仅用于添加收藏)</span>
              <span id="directoryToggleArrow" class="toggle-arrow" style="margin-right: 8px;">▶ 展开浏览</span>
            </h3>
            <button id="syncL1Btn" class="action-btn" title="只同步所有 1 级目录" style="font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: pointer;">同步 1 级 🔄</button>
          </div>
          <div id="directoryTree" class="directory-tree-container collapsed">
            <div class="loading-spinner-wrapper">
              <div class="spinner"></div>
              <span>正在加载本地数据...</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- 底部状态栏 -->
    <footer class="app-footer">
      <span id="syncTime">上次同步: --</span>
    </footer>
  </div>

  <!-- Toast 消息容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="sync-helper.js"></script>
  <script src="popup.js"></script>
</body>
</html>
